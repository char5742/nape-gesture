name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check product model documentation
        run: |
          ruby -c scripts/check-product-model-documentation.rb
          ruby scripts/check-product-model-documentation.rb

      - name: Show Swift version
        run: swift --version

      - name: Check provenance guard
        run: sh scripts/check-provenance.sh

      - name: Test provenance guard
        run: sh scripts/test-check-provenance.sh

      - name: Check product output boundary
        run: sh scripts/check-product-output-boundary.sh

      - name: Check diagnostic event time
        run: sh scripts/check-diagnostic-event-time.sh

      - name: Build debug
        run: swift build --scratch-path .build

      # Issue #148でsourceと同時にfixed finger-count期待値へ更新する。
      # 現在の成功は製品完成を意味せず、completion collectorは別guardで失敗する。
      - name: Run current core regression before finger-count migration
        run: .build/debug/nape-gesture-core-tests

      - name: Run current output regression before finger-count migration
        run: .build/debug/nape-gesture-product-output-tests

      - name: Verify 2-finger internal scroll fixture derivation
        run: |
          ruby -c scripts/derive-trackpad-scroll-output-model.rb
          ruby scripts/derive-trackpad-scroll-output-model.rb > "$RUNNER_TEMP/scroll-output-model.json"
          cmp "$RUNNER_TEMP/scroll-output-model.json" Fixtures/trackpad-contract/25F80/scroll-output-model.json

      - name: Test product output provenance finalizer
        run: |
          ruby -c scripts/finalize-product-output-provenance.rb
          ruby -c scripts/test-finalize-product-output-provenance.rb
          ruby scripts/test-finalize-product-output-provenance.rb

      - name: Run diagnostic output and dry-run contract tests
        run: .build/debug/nape-gesture-diagnostic-output-tests

      - name: Test atomic app bundle installation
        run: sh scripts/test-bundle-app-safety.sh .build/debug/nape-gesture

      - name: Run trackpad analyzer contract tests
        run: |
          fixture_dir="$RUNNER_TEMP/trackpad-analyzer-fixtures"
          rm -rf "$fixture_dir"
          .build/debug/nape-gesture-diagnostic-output-tests --write-trackpad-analyzer-fixtures "$fixture_dir"

          .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/host.jsonl" --manifest "$fixture_dir/host.manifest.json" --json > "$fixture_dir/host.report.json"
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); abort "host正常系またはPhase 1 schema互換性が失敗" unless r["schemaVersion"] == 1 && !r.key?("contractPath") && !r.key?("contractComparison") && r["passed"] && r.dig("hostReconstruction", "passed")' "$fixture_dir/host.report.json"

          .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/generated.jsonl" --manifest "$fixture_dir/generated.manifest.json" --provenance "$fixture_dir/generated.provenance.jsonl" --json > "$fixture_dir/generated.report.json"
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); abort "generatedProduct正常系またはPhase 1 schema互換性が失敗" unless r["schemaVersion"] == 1 && !r.key?("contractPath") && !r.key?("contractComparison") && r["passed"] && r.dig("provenance", "passed")' "$fixture_dir/generated.report.json"

          contract_path="Fixtures/trackpad-contract/25F80/scroll-momentum-contract.json"
          .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/contract-valid.jsonl" --manifest "$fixture_dir/contract-valid.manifest.json" --provenance "$fixture_dir/contract-valid.provenance.jsonl" --contract "$contract_path" --json > "$fixture_dir/contract-valid.report.json"
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); c=r["contractComparison"]; abort "contract正常系が失敗" unless r["schemaVersion"] == 2 && r["passed"] && r.dig("structure", "passed") && r.dig("manifest", "passed") && r.dig("hostReconstruction", "passed") && r.dig("provenance", "passed") && c && c["provided"] && c["passed"]' "$fixture_dir/contract-valid.report.json"

          contract_failure_status=0
          if .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/contract-missing-momentum-terminal.jsonl" --manifest "$fixture_dir/contract-missing-momentum-terminal.manifest.json" --provenance "$fixture_dir/contract-missing-momentum-terminal.provenance.jsonl" --contract "$contract_path" --json > "$fixture_dir/contract-missing-momentum-terminal.report.json"; then
            contract_failure_status=0
          else
            contract_failure_status=$?
          fi
          if [ "$contract_failure_status" -ne 1 ]; then
            echo "momentum terminal欠落の終了コードが1ではありません: $contract_failure_status" >&2
            exit 1
          fi
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); c=r["contractComparison"]; codes=Array(c && c["issues"]).map { |i| i["code"] }; abort "contract異常系の失敗境界が不正" unless r["schemaVersion"] == 2 && !r["passed"] && r.dig("structure", "passed") && r.dig("manifest", "passed") && r.dig("hostReconstruction", "passed") && r.dig("provenance", "passed") && c && c["provided"] && !c["passed"] && codes.include?("missing_momentum_terminal")' "$fixture_dir/contract-missing-momentum-terminal.report.json"

          unconfirmed_status=0
          if .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/contract-unconfirmed-gesture.jsonl" --manifest "$fixture_dir/contract-unconfirmed-gesture.manifest.json" --provenance "$fixture_dir/contract-unconfirmed-gesture.provenance.jsonl" --contract "$contract_path" --json > "$fixture_dir/contract-unconfirmed-gesture.report.json"; then
            unconfirmed_status=0
          else
            unconfirmed_status=$?
          fi
          if [ "$unconfirmed_status" -ne 1 ]; then
            echo "未確定type 29混入の終了コードが1ではありません: $unconfirmed_status" >&2
            exit 1
          fi
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); c=r["contractComparison"]; codes=Array(c && c["issues"]).map { |i| i["code"] }; abort "未確定type 29混入をcontract異常系にできない" unless r["schemaVersion"] == 2 && !r["passed"] && r.dig("structure", "passed") && r.dig("manifest", "passed") && r.dig("hostReconstruction", "passed") && r.dig("provenance", "passed") && c && !c["passed"] && codes.include?("unconfirmed_gesture_event")' "$fixture_dir/contract-unconfirmed-gesture.report.json"

          if .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/generated.jsonl" --manifest "$fixture_dir/generated.manifest.json" --json > "$fixture_dir/missing-provenance.report.json"; then
            echo "generatedProductがprovenanceなしで成功しました" >&2
            exit 1
          fi
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); abort "provenance欠落を検出できない" unless !r["passed"] && r.dig("provenance", "required") && !r.dig("provenance", "provided")' "$fixture_dir/missing-provenance.report.json"

          if .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/generated.jsonl" --manifest "$fixture_dir/generated.manifest.json" --provenance "$fixture_dir/pid.provenance.jsonl" --json > "$fixture_dir/pid.report.json"; then
            echo "PID配送provenanceが成功しました" >&2
            exit 1
          fi
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); codes=r.dig("provenance", "analysis", "issues").map { |i| i["code"] }; abort "PID配送違反を検出できない" unless codes.include?("forbiddenDelivery")' "$fixture_dir/pid.report.json"

          ruby -rjson -e 'records=File.readlines(ARGV[0], chomp: true).map { |line| JSON.parse(line) }; records[0]["destinationPid"] = 123; File.write(ARGV[1], records.map { |record| JSON.generate(record) }.join("\n") + "\n")' "$fixture_dir/generated.provenance.jsonl" "$fixture_dir/unknown.provenance.jsonl"
          if .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/generated.jsonl" --manifest "$fixture_dir/generated.manifest.json" --provenance "$fixture_dir/unknown.provenance.jsonl" --json > "$fixture_dir/unknown-provenance.report.json"; then
            echo "未知fieldを持つgeneratedProduct provenanceが成功しました" >&2
            exit 1
          fi
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); codes=r.dig("provenance", "issues").map { |i| i["code"] }; abort "provenance未知fieldを失敗にできない" unless codes.include?("unknown_fields")' "$fixture_dir/unknown-provenance.report.json"

          if .build/debug/nape-gesture analyze-trackpad-event-log "$fixture_dir/negative-raw.jsonl" --manifest "$fixture_dir/negative-raw.manifest.json" --json > "$fixture_dir/negative-raw.report.json"; then
            echo "負のraw fieldが成功しました" >&2
            exit 1
          fi
          ruby -rjson -e 'r=JSON.parse(File.read(ARGV[0])); codes=r.dig("structure", "issues").map { |i| i["code"] }; abort "負のraw fieldを構造化失敗にできない" unless codes.include?("raw_field_number_out_of_range")' "$fixture_dir/negative-raw.report.json"

      - name: Run legacy diagnostic and safety smoke tests
        run: |
          sh -n scripts/collect-runtime-event-evidence.sh
          sh -n scripts/collect-completion-evidence.sh
          sh -n scripts/check-product-output-boundary.sh
          sh -n scripts/check-diagnostic-event-time.sh
          sh -n scripts/test-bundle-app-safety.sh
          ruby -c scripts/check-finger-count-product-model.rb
          ruby -c scripts/verify-trackpad-physical-observations.rb
          ruby scripts/verify-trackpad-physical-observations.rb --fixtures-only --json > /dev/null
          ruby -c scripts/derive-trackpad-scroll-output-model.rb
          ruby -c scripts/finalize-product-output-provenance.rb
          ruby -c scripts/test-finalize-product-output-provenance.rb
          ruby -c scripts/wait-for-trackpad-capture-ready.rb
          ruby -c scripts/test-wait-for-trackpad-capture-ready.rb
          ruby scripts/test-wait-for-trackpad-capture-ready.rb
          target_stable_id="vendor=123;product=456;manufacturer=example;name=nape-pro-mouse;transport=bluetooth"
          .build/debug/nape-gesture trackpad-event-log --help | grep -q -- '--evidence-kind'
          .build/debug/nape-gesture trackpad-event-log --help | grep -q -- '--ready-file'
          .build/debug/nape-gesture trackpad-event-log --help | grep -q -- '--ready-token'
          jq -e '
            .schemaVersion == 1
            and .status == "partial"
            and .privacy.containsSerializedEvents == false
            and .privacy.containsPointerCoordinates == false
            and .privacy.containsKeyboardData == false
            and .privacy.containsDeviceIdentifiers == false
            and ([.captures[] | select(.status == "capture-window-missed")] | length) == 1
            and (
              [.. | objects | keys[] | ascii_downcase]
              | map(select(. == "serializedeventbase64"
                or . == "sourceuserdata"
                or . == "rawfields"
                or . == "keycode"
                or . == "keyboardkeycode"
                or . == "characters"
                or . == "charactersignoringmodifiers"
                or . == "pointercoordinates"
                or . == "pointerx"
                or . == "pointery"
                or . == "mousex"
                or . == "mousey"
                or . == "locationx"
                or . == "locationy"
                or . == "locationid"
                or . == "deviceidentifier"
                or . == "deviceuniqueid"
                or . == "registryentryid"
                or . == "vendorid"
                or . == "productid"
                or . == "serialnumber"))
              | length
            ) == 0
          ' Fixtures/trackpad-contract/25F80/physical-observations.json > /dev/null
          jq -e '
            .schemaVersion == 1
            and .fixtureID == "trackpad-scroll-momentum-25F80-v1"
            and .contractID == "trackpad-scroll-momentum-v1"
            and .status == "confirmed"
            and .osBuild == "25F80"
          ' Fixtures/trackpad-contract/25F80/scroll-momentum-contract.json > /dev/null
          test "$(shasum -a 256 Fixtures/trackpad-contract/25F80/scroll-momentum-contract.json | awk '{print $1}')" = "8e2a1841ef23a47fcb274c1c8e7c7c39be43e8ab7c8792caf2cd874242a61294"
          .build/debug/nape-gesture analyze-trackpad-event-log --help | grep -q 'generatedProduct'
          .build/debug/nape-gesture analyze-trackpad-event-log --help | grep -q -- '--contract'
          if .build/debug/nape-gesture trackpad-event-log --duration 0; then
            echo "trackpad-event-log が不正なdurationを受理しました" >&2
            exit 1
          fi
          ready_token=11111111-2222-3333-4444-555555555555
          if .build/debug/nape-gesture trackpad-event-log --duration 1 --out /tmp/trackpad-ready-missing-token --ready-file /tmp/trackpad-ready-missing-token.ready --evidence-kind synthetic; then
            echo "trackpad-event-log がtokenなしのready fileを受理しました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture trackpad-event-log --duration 1 --ready-token "$ready_token"; then
            echo "trackpad-event-log がready fileなしのtokenを受理しました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture trackpad-event-log --duration 1 --out "$RUNNER_TEMP/generated-without-run-token.jsonl" --evidence-kind generatedProduct --only-generated --scenario-id pure-trackpad-vertical-scroll --device-label nape-gesture-product-output --repo-head-sha aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa; then
            echo "generatedProduct captureが共通run tokenなしで開始しました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture trackpad-event-log --duration 1 --ready-file /tmp/trackpad-ready-without-token-in-name.json --ready-token "$ready_token"; then
            echo "trackpad-event-log がtokenを含まないready file名を受理しました" >&2
            exit 1
          fi
          ready_conflict_path="/tmp/trackpad-ready-$ready_token"
          if .build/debug/nape-gesture trackpad-event-log --duration 1 --out "$ready_conflict_path" --ready-file "$ready_conflict_path" --ready-token "$ready_token" --evidence-kind synthetic; then
            echo "trackpad-event-log がlogとready fileの同一locationを受理しました" >&2
            exit 1
          fi
          ready_hierarchy_manifest="/tmp/trackpad-ready-$ready_token.manifest"
          if .build/debug/nape-gesture trackpad-event-log --duration 1 --out /tmp/trackpad-ready-hierarchy.log --manifest-out "$ready_hierarchy_manifest" --ready-file "$ready_hierarchy_manifest/ready.$ready_token.json" --ready-token "$ready_token" --evidence-kind synthetic; then
            echo "trackpad-event-log がmanifest予定file配下のready pathを受理しました" >&2
            exit 1
          fi
          test ! -d "$ready_hierarchy_manifest"
          case_probe="$RUNNER_TEMP/NapeCaseProbe"
          mkdir "$case_probe"
          if [ -d "$RUNNER_TEMP/napecaseprobe" ]; then
            case_manifest="$RUNNER_TEMP/NapeCase-$ready_token"
            case_ready="$RUNNER_TEMP/napecase-$ready_token/ready.$ready_token.json"
            if .build/debug/nape-gesture trackpad-event-log --duration 1 --out "$RUNNER_TEMP/case-test.log" --manifest-out "$case_manifest" --ready-file "$case_ready" --ready-token "$ready_token" --evidence-kind synthetic; then
              echo "trackpad-event-log がcase違いのmanifest親pathを受理しました" >&2
              exit 1
            fi
            test ! -d "$case_manifest"
            test ! -d "$RUNNER_TEMP/napecase-$ready_token"
          fi
          rmdir "$case_probe"
          printf '%s' '{"schemaVersion":2}' > /tmp/invalid-trackpad-event-log.jsonl
          printf '%s\n' '{}' > /tmp/invalid-trackpad-event-manifest.json
          if .build/debug/nape-gesture analyze-trackpad-event-log /tmp/invalid-trackpad-event-log.jsonl --manifest /tmp/invalid-trackpad-event-manifest.json --json > /tmp/invalid-trackpad-event-report.json; then
            echo "不正なtrackpad event logがanalyzerを通過しました" >&2
            exit 1
          fi
          grep -q '"passed" : false' /tmp/invalid-trackpad-event-report.json
          .build/debug/nape-gesture generate-scroll --x 120 --y 0 --steps 3 --momentum-steps 2 --dry-run --log-json > /tmp/generated-scroll.jsonl
          .build/debug/nape-gesture analyze-log /tmp/generated-scroll.jsonl
          for scenario in space-left space-right mission-control horizontal-scroll page-back page-forward zoom-in zoom-out; do
            if [ "$scenario" = "space-left" ] || [ "$scenario" = "space-right" ]; then
              .build/debug/nape-gesture system-test run --scenario "$scenario" --target finder --dry-run --log-json --out "/tmp/system-$scenario.jsonl"
            else
              .build/debug/nape-gesture system-test run --scenario "$scenario" --dry-run --log-json --out "/tmp/system-$scenario.jsonl"
            fi
            .build/debug/nape-gesture analyze-log "/tmp/system-$scenario.jsonl" --json --assert-system-scenario "$scenario"
          done
          if .build/debug/nape-gesture analyze-log /tmp/system-page-back.jsonl --json --assert-system-scenario page-forward; then
            echo "page-back dry-run が page-forward のシナリオ証跡として通ってしまいました" >&2
            exit 1
          fi
          sed 's/"systemTestScenario":"space-right"/"systemTestScenario":"horizontal-scroll"/g' /tmp/system-space-right.jsonl > /tmp/system-space-right-wrong-metadata.jsonl
          if .build/debug/nape-gesture analyze-log /tmp/system-space-right-wrong-metadata.jsonl --json --assert-system-scenario space-right; then
            echo "space-right の systemTestScenario 不一致が通ってしまいました" >&2
            exit 1
          fi
          sed 's/"flags":1048576/"flags":1179648/g' /tmp/system-page-back.jsonl > /tmp/system-page-back-extra-shift.jsonl
          if .build/debug/nape-gesture analyze-log /tmp/system-page-back-extra-shift.jsonl --json --assert-system-scenario page-back; then
            echo "page-back の余計な modifier が通ってしまいました" >&2
            exit 1
          fi
          sed 's/"pointDeltaX":[0-9][0-9]*/"pointDeltaX":-50/g; s/"scrollDeltaX":[0-9][0-9]*/"scrollDeltaX":-50/g' /tmp/system-space-right.jsonl > /tmp/system-space-right-reversed.jsonl
          if .build/debug/nape-gesture analyze-log /tmp/system-space-right-reversed.jsonl --json --assert-system-scenario space-right; then
            echo "space-right の逆方向 scroll が通ってしまいました" >&2
            exit 1
          fi
          sed 's/"momentumPhase":0/"momentumPhase":1/' /tmp/system-space-right.jsonl > /tmp/system-space-right-momentum.jsonl
          if .build/debug/nape-gesture analyze-log /tmp/system-space-right-momentum.jsonl --json --assert-system-scenario space-right; then
            echo "space-right の momentumPhase 混入が通ってしまいました" >&2
            exit 1
          fi
          .build/debug/nape-gesture system-test run --scenario kill-switch --dry-run --log-json --out /tmp/system-kill-switch.jsonl
          .build/debug/nape-gesture analyze-log /tmp/system-kill-switch.jsonl --json --assert-system-scenario kill-switch --assert-kill-switch-shortcut
          .build/debug/nape-gesture system-test run --scenario normal-after-release --dry-run --log-json --out /tmp/system-normal-after-release.jsonl
          .build/debug/nape-gesture analyze-log /tmp/system-normal-after-release.jsonl --json --assert-system-scenario normal-after-release --assert-has-unmarked-click --assert-has-unmarked-drag --assert-has-unmarked-wheel
          .build/debug/nape-gesture system-test run --scenario gesture-wheel-then-kill-switch --dry-run --log-json --out /tmp/system-gesture-wheel-then-kill-switch.jsonl
          .build/debug/nape-gesture analyze-log /tmp/system-gesture-wheel-then-kill-switch.jsonl --json --assert-system-scenario gesture-wheel-then-kill-switch --assert-kill-switch-shortcut --assert-gesture-before-kill-switch
          .build/debug/nape-gesture compare-log Fixtures/sample-trackpad-scroll-log.jsonl Fixtures/sample-generated-scroll-log.jsonl
          .build/debug/nape-gesture analyze-hid-log Fixtures/sample-hid-log.jsonl
          .build/debug/nape-gesture analyze-association Fixtures/sample-association-hid-log.jsonl Fixtures/sample-association-event-log.jsonl --window 0.12 --json
          .build/debug/nape-gesture analyze-association Fixtures/sample-association-hid-log.jsonl Fixtures/clean-association-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window
          if .build/debug/nape-gesture analyze-association Fixtures/sample-association-hid-log.jsonl Fixtures/sample-association-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "sample-association-event-log が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-association Fixtures/empty-association-hid-log.jsonl Fixtures/clean-association-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "empty-association-hid-log が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-association Fixtures/association-scroll-mismatch-hid-log.jsonl Fixtures/association-scroll-mismatch-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "association-scroll-mismatch が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-association Fixtures/association-ac-pan-hid-log.jsonl Fixtures/association-ac-pan-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "association-ac-pan が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-association Fixtures/association-button-mismatch-hid-log.jsonl Fixtures/association-button-mismatch-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "association-button-mismatch が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-association Fixtures/association-non-target-hid-log.jsonl Fixtures/association-non-target-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "association-non-target が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-association Fixtures/association-mixed-device-hid-log.jsonl Fixtures/association-mixed-device-event-log.jsonl --window 0.12 --target-stable-id "$target_stable_id" --json --assert-valid-window; then
            echo "association-mixed-device が有効な紐づけ証跡として通ってしまいました" >&2
            exit 1
          fi
          .build/debug/nape-gesture analyze-target-log Fixtures/clean-target-log.jsonl --json --assert-no-leaks
          .build/debug/nape-gesture analyze-target-log Fixtures/clean-target-log.jsonl --json --assert-has-generated-event
          if .build/debug/nape-gesture analyze-target-log Fixtures/leaky-target-log.jsonl --json --assert-no-leaks; then
            echo "leaky-target-log が漏れ候補なしとして通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-target-log Fixtures/no-generated-target-log.jsonl --json --assert-no-leaks --assert-has-generated-event; then
            echo "no-generated-target-log が生成イベントありとして通ってしまいました" >&2
            exit 1
          fi
          .build/debug/nape-gesture analyze-target-log Fixtures/normal-input-target-log.jsonl --json --assert-has-unmarked-click --assert-has-unmarked-drag --assert-has-unmarked-wheel
          if .build/debug/nape-gesture analyze-target-log Fixtures/normal-input-missing-click-target-log.jsonl --json --assert-has-unmarked-click --assert-has-unmarked-drag --assert-has-unmarked-wheel; then
            echo "normal-input-missing-click-target-log が通常クリックありとして通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-target-log Fixtures/normal-input-missing-drag-target-log.jsonl --json --assert-has-unmarked-click --assert-has-unmarked-drag --assert-has-unmarked-wheel; then
            echo "normal-input-missing-drag-target-log が通常ドラッグありとして通ってしまいました" >&2
            exit 1
          fi
          if .build/debug/nape-gesture analyze-target-log Fixtures/normal-input-missing-wheel-target-log.jsonl --json --assert-has-unmarked-click --assert-has-unmarked-drag --assert-has-unmarked-wheel; then
            echo "normal-input-missing-wheel-target-log が通常ホイールありとして通ってしまいました" >&2
            exit 1
          fi
          .build/debug/nape-gesture analyze-target-log Fixtures/gesture-target-log.jsonl --json --assert-has-gesture
          .build/debug/nape-gesture benchmark --events 200000 --json --assert-baseline > /tmp/nape-benchmark.json
          grep -q '"schemaVersion" : 3' /tmp/nape-benchmark.json
          grep -q '"sampledNanosecondsPerEvent"' /tmp/nape-benchmark.json
          grep -q '"sampledNanosecondsPerCommand"' /tmp/nape-benchmark.json
          grep -q '"p95Nanoseconds"' /tmp/nape-benchmark.json
          grep -q '"p99Nanoseconds"' /tmp/nape-benchmark.json
          grep -q '"recognizerP95NanosecondsPerEvent"' /tmp/nape-benchmark.json
          grep -q '"scrollPlannerP99NanosecondsPerCommand"' /tmp/nape-benchmark.json
          .build/debug/nape-gesture doctor --benchmark-events 50000 --json > /tmp/nape-doctor.json
          grep -q '"runtimeReadiness"' /tmp/nape-doctor.json
          grep -q '"tccStatus"' /tmp/nape-doctor.json
          grep -q '"permissionTarget"' /tmp/nape-doctor.json
          grep -q '"grantRequired"' /tmp/nape-doctor.json
          grep -q '"targetDeviceDiagnostics"' /tmp/nape-doctor.json
          grep -q '"outputContract"' /tmp/nape-doctor.json
          grep -q '"schemaVersion" : 3' /tmp/nape-doctor.json
          grep -q '"sampledNanosecondsPerEvent"' /tmp/nape-doctor.json
          grep -q '"sampledNanosecondsPerCommand"' /tmp/nape-doctor.json
          grep -q '"p95Nanoseconds"' /tmp/nape-doctor.json
          grep -q '"p99Nanoseconds"' /tmp/nape-doctor.json

      - name: Build release
        run: swift build -c release --scratch-path .build

      - name: Run release core tests
        run: .build/release/nape-gesture-core-tests

      - name: Run release product output tests
        run: .build/release/nape-gesture-product-output-tests

      - name: Run release diagnostic output and dry-run contract tests
        run: .build/release/nape-gesture-diagnostic-output-tests

      - name: Verify app bundle
        run: |
          .build/release/nape-gesture bundle-app --out .build/NapeGesture.app --replace
          .build/release/nape-gesture verify-bundle .build/NapeGesture.app
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' .build/NapeGesture.app/Contents/Info.plist | grep -Fx 'dev.char5742.nape-gesture'
          /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' .build/NapeGesture.app/Contents/Info.plist | grep -Fx 'nape-gesture'
          /usr/libexec/PlistBuddy -c 'Print :CFBundleName' .build/NapeGesture.app/Contents/Info.plist | grep -Fx 'Nape Gesture'
          /usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' .build/NapeGesture.app/Contents/Info.plist | grep -Fx 'Nape Gesture'
          /usr/libexec/PlistBuddy -c 'Print :LSUIElement' .build/NapeGesture.app/Contents/Info.plist | grep -Fx 'false'
          cmp LICENSE .build/NapeGesture.app/Contents/Resources/LICENSE.txt
          cmp THIRD_PARTY_NOTICES.md .build/NapeGesture.app/Contents/Resources/THIRD_PARTY_NOTICES.md

      - name: Verify GUI smoke
        run: |
          if ! launchctl print "gui/$(id -u)" 2>/dev/null | grep -q 'session = Aqua'; then
            echo "::warning::GUI smoke skipped because this runner has no active macOS Aqua session"
            exit 0
          fi
          gui_config="${RUNNER_TEMP:-/tmp}/nape-gui-smoke.config.json"
          .build/NapeGesture.app/Contents/MacOS/nape-gesture gui-smoke --config "$gui_config" --json --assert > /tmp/nape-gui-smoke.json
          test "$(/usr/bin/plutil -extract activationPolicy raw /tmp/nape-gui-smoke.json)" = "regular"
          test "$(/usr/bin/plutil -extract statusItemTitle raw /tmp/nape-gui-smoke.json)" = "NG"
          test "$(/usr/bin/plutil -extract settingsWindowTitle raw /tmp/nape-gui-smoke.json)" = "Nape Gesture 設定"
          test "$(/usr/bin/plutil -extract runtimeIdentity.isAppBundle raw /tmp/nape-gui-smoke.json)" = "true"
