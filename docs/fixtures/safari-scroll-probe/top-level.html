<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nape Gesture top-level scroll probe</title>
<style>
  :root { font-family: system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; width: 3600px; min-height: 3000px; color: #161616; background: #eef3f8; }
  #toolbar { position: fixed; top: 0; left: 0; z-index: 10; width: 720px; padding: 12px 16px; background: #fff; border: 1px solid #555; }
  #status { display: block; margin-bottom: 8px; font: 14px ui-monospace, monospace; }
  button { min-height: 34px; padding: 4px 12px; border: 1px solid #444; border-radius: 4px; background: #fff; color: #111; }
  main { width: 3600px; height: 3000px; padding: 120px 40px 40px; }
  .marker { width: 520px; min-height: 180px; padding: 24px; border: 2px solid #111; background: #fff; }
</style>
<div id="toolbar">
  <output id="status">scrollX=0 scrollY=0 wheel=0 wheelTarget=none</output>
  <button id="reset" type="button">状態をリセット</button>
</div>
<main>
  <div id="top-content" class="marker" role="region" aria-label="Top-level scroll target" tabindex="0">Top-level scroll target</div>
</main>
<script>
  history.scrollRestoration = 'manual';
  const status = document.querySelector('#status');
  let wheelCount = 0;
  let wheelTarget = 'none';

  function render() {
    status.textContent = `scrollX=${Math.round(scrollX)} scrollY=${Math.round(scrollY)} `
      + `wheel=${wheelCount} wheelTarget=${wheelTarget}`;
  }

  function reset() {
    scrollTo(0, 0);
    wheelCount = 0;
    wheelTarget = 'none';
    render();
  }

  addEventListener('scroll', render);
  addEventListener('wheel', event => {
    wheelCount += 1;
    wheelTarget = event.target.id || event.target.tagName;
    render();
  }, { capture: true });
  document.querySelector('#reset').addEventListener('click', reset);
  addEventListener('pageshow', reset);
  render();
</script>
</html>
