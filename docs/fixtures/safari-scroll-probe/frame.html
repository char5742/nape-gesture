<!doctype html>
<html lang="ja" data-probe-scenario="frame" data-probe-schema-version="2">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AX accessible frame</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 1800px; font: 16px system-ui, sans-serif; color: #161616; background: #fff; }
  .row { min-height: 90px; padding: 12px; border-bottom: 1px solid #8fa0b8; }
</style>
<output id="status" hidden>{"schemaVersion":2,"scenario":"frame","ready":true,"scroll":{"x":0,"y":0,"maxY":1468,"atEnd":false},"wheel":{"count":0,"target":"none"}}</output>
<main id="frame-content"></main>
<script data-probe-interface="napeGestureScrollProbe">
  history.scrollRestoration = 'manual';
  let wheelCount = 0;
  let wheelTarget = 'none';

  for (let index = 1; index <= 20; index += 1) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `frame-${index}`;
    row.textContent = `frame row ${index}`;
    document.querySelector('#frame-content').append(row);
  }

  function snapshot() {
    const maxY = Math.max(0, document.documentElement.scrollHeight - innerHeight);
    const y = Math.round(scrollY);
    return {
      schemaVersion: 2,
      scenario: 'frame',
      ready: true,
      scroll: {
        x: Math.round(scrollX),
        y,
        maxY: Math.round(maxY),
        atEnd: y >= Math.round(maxY)
      },
      wheel: { count: wheelCount, target: wheelTarget }
    };
  }

  function report() {
    const value = snapshot();
    const status = document.querySelector('#status');
    status.textContent = JSON.stringify(value);
    status.dataset.probeState = status.textContent;
    document.documentElement.dataset.probeReady = String(value.ready);
    parent.postMessage({ type: 'frame-state', state: value }, location.origin);
  }

  function reset() {
    scrollTo(0, 0);
    wheelCount = 0;
    wheelTarget = 'none';
    report();
  }

  addEventListener('scroll', report);
  addEventListener('wheel', event => {
    wheelCount += 1;
    wheelTarget = event.target.id || event.target.tagName;
    report();
  }, { capture: true });
  addEventListener('message', event => {
    if (event.origin !== location.origin || event.data?.type !== 'reset') return;
    reset();
  });
  addEventListener('pageshow', reset);
  window.napeGestureScrollProbe = Object.freeze({
    schemaVersion: 2,
    scenario: 'frame',
    snapshot,
    reset
  });
  report();
</script>
</html>
