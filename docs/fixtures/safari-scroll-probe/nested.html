<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nape Gesture nested scroll probe</title>
<style>
  :root { color-scheme: light; font-family: system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 2200px; color: #161616; background: #f2f4f7; }
  #toolbar { position: sticky; top: 0; z-index: 10; padding: 12px 16px; background: #fff; border-bottom: 1px solid #707070; }
  #status { display: block; margin-bottom: 8px; font: 14px ui-monospace, monospace; overflow-wrap: anywhere; }
  button { min-height: 34px; padding: 4px 12px; border: 1px solid #444; border-radius: 4px; background: #fff; color: #111; }
  .probes { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; max-width: 1200px; padding: 24px; }
  section { min-width: 0; }
  h1 { margin: 0 0 12px; font-size: 18px; }
  .scroll-target { width: 100%; height: 340px; overflow: auto; border: 4px solid #111; background: #fff; }
  #generic-content, .frame-content { min-height: 1800px; padding: 20px; }
  .row { min-height: 90px; padding: 12px; border-bottom: 1px solid #b8bec8; }
  iframe { display: block; width: 100%; height: 340px; border: 4px solid #111; background: #fff; }
  .outer-spacer { height: 1200px; border-top: 1px solid #707070; }
  @media (max-width: 800px) { .probes { grid-template-columns: 1fr; } }
</style>
<div id="toolbar">
  <output id="status">outer=0 inner=0 innerWheel=0 innerTarget=none frame=0 frameWheel=0 frameTarget=none</output>
  <button id="reset" type="button">状態をリセット</button>
</div>
<main class="probes">
  <section>
    <h1>Generic overflow region</h1>
    <div id="inner" class="scroll-target" role="region" aria-label="Generic overflow region" tabindex="0">
      <div id="generic-content"></div>
    </div>
  </section>
  <section>
    <h1>AX accessible frame</h1>
    <iframe id="frame" title="AX accessible frame" src="frame.html"></iframe>
  </section>
</main>
<div class="outer-spacer"></div>
<script>
  history.scrollRestoration = 'manual';
  const status = document.querySelector('#status');
  const inner = document.querySelector('#inner');
  const frame = document.querySelector('#frame');
  const state = { innerWheel: 0, innerTarget: 'none', frameY: 0, frameWheel: 0, frameTarget: 'none' };

  function addRows(container, prefix) {
    for (let index = 1; index <= 20; index += 1) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = `${prefix}-${index}`;
      row.textContent = `${prefix} row ${index}`;
      container.append(row);
    }
  }

  function render() {
    status.textContent = `outer=${Math.round(scrollY)} inner=${Math.round(inner.scrollTop)} `
      + `innerWheel=${state.innerWheel} innerTarget=${state.innerTarget} `
      + `frame=${Math.round(state.frameY)} frameWheel=${state.frameWheel} frameTarget=${state.frameTarget}`;
  }

  function reset() {
    scrollTo(0, 0);
    inner.scrollTop = 0;
    state.innerWheel = 0;
    state.innerTarget = 'none';
    state.frameY = 0;
    state.frameWheel = 0;
    state.frameTarget = 'none';
    frame.contentWindow?.postMessage({ type: 'reset' }, location.origin);
    render();
  }

  addRows(document.querySelector('#generic-content'), 'generic');
  addEventListener('scroll', render);
  inner.addEventListener('scroll', render);
  inner.addEventListener('wheel', event => {
    state.innerWheel += 1;
    state.innerTarget = event.target.id || event.target.tagName;
    render();
  }, { capture: true });
  addEventListener('message', event => {
    if (event.source !== frame.contentWindow || event.data?.type !== 'frame-state') return;
    state.frameY = event.data.scrollY;
    state.frameWheel = event.data.wheelCount;
    state.frameTarget = event.data.wheelTarget;
    render();
  });
  document.querySelector('#reset').addEventListener('click', reset);
  addEventListener('pageshow', reset);
  render();
</script>
</html>
